name: Build desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            artifact: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc

          - name: macOS Intel
            artifact: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin

          - name: macOS Apple Silicon
            artifact: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin

          - name: macOS Universal
            artifact: macos-universal
            runner: macos-15
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin

          - name: Linux x64
            artifact: linux-x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu

          - name: Linux ARM64
            artifact: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rust_targets: aarch64-unknown-linux-gnu

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust target
        shell: bash
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            pkg-config \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Install JavaScript dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Test
        shell: bash
        run: pnpm run verify

      - name: Build installers
        shell: bash
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: douyin-archive-${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30
          path: |
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*-setup.exe
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.app
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.rpm
            src-tauri/target/**/bundle/**/*.AppImage

  chrome-extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JavaScript dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Test extension
        shell: bash
        run: pnpm run test:extension

      - name: Read extension version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./chrome-extension/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package extension ZIP
        shell: bash
        run: |
          set -euo pipefail
          ZIP_NAME="DouyinArchiveCompanion-${{ steps.version.outputs.version }}.zip"
          cd chrome-extension
          zip -r "../${ZIP_NAME}" . -x '*.pem' -x 'test-*'
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Restore extension signing key
        if: ${{ env.EXTENSION_SIGNING_KEY != '' }}
        id: signing-key
        shell: bash
        env:
          EXTENSION_SIGNING_KEY: ${{ secrets.EXTENSION_SIGNING_KEY }}
        run: |
          mkdir -p .local
          echo "$EXTENSION_SIGNING_KEY" | base64 -d > .local/douyin-archive-companion.pem
          chmod 600 .local/douyin-archive-companion.pem

      - name: Pack signed CRX
        if: steps.signing-key.outcome == 'success'
        shell: bash
        run: pnpm run extension:pack

      - name: Upload Chrome Extension
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: |
            ${{ env.ZIP_NAME }}
            src-tauri/target/release/bundle/chrome-extension/*.crx
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [package, chrome-extension]
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          # Desktop installers
          while IFS= read -r -d '' file; do
            rel="${file#dist-artifacts/}"
            artifact="${rel%%/*}"
            base="$(basename "$file")"

            cp "$file" "release-assets/${artifact}-${base}"
          done < <(find dist-artifacts -type f \( \
            -name '*.msi' -o \
            -name '*-setup.exe' -o \
            -name '*.dmg' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.AppImage' \
          \) -print0)

          # Chrome extension artifacts
          if [ -d "dist-artifacts/chrome-extension" ]; then
            while IFS= read -r -d '' file; do
              base="$(basename "$file")"
              cp "$file" "release-assets/${base}"
            done < <(find dist-artifacts/chrome-extension -type f \( \
              -name '*.crx' -o \
              -name '*.zip' \
            \) -print0)
          fi

          echo "Release assets:"
          find release-assets -maxdepth 1 -type f -print

          if [ -z "$(find release-assets -maxdepth 1 -type f -print -quit)" ]; then
            echo "::error::No release assets found"
            exit 1
          fi

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --target "${{ github.sha }}" \
              --generate-notes \
              --draft=false
          fi

          gh release upload "$TAG" release-assets/* --clobber
